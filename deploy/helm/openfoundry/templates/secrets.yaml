{{/*
Secrets are expected to be pre-created externally.
This template documents the expected secret names and keys.
Create these secrets before installing the chart:

  kubectl create secret generic openfoundry-postgres \
    --from-literal=username=openfoundry \
    --from-literal=password=<password>

  kubectl create secret generic openfoundry-oidc \
    --from-literal=clientSecret=<secret>

  kubectl create secret generic openfoundry-pas \
    --from-literal=dbUrl=<pas-db-url>
*/}}
