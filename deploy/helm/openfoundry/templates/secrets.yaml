{{/*
HELM-01: External secrets pattern.

Secrets MUST be pre-created before chart installation. This template validates
their existence at deploy time and fails fast with clear error messages.

Required secrets:
  kubectl create secret generic openfoundry-postgres \
    --from-literal=username=openfoundry \
    --from-literal=password=<password>

  kubectl create secret generic openfoundry-oidc \
    --from-literal=clientSecret=<secret>

  kubectl create secret generic openfoundry-pas \
    --from-literal=dbUrl=<pas-db-url>
*/}}

{{/*
HELM-02: Validate OIDC client ID is set.
Empty string is falsy in Go templates, so we use `not` instead of `and`.
*/}}
{{- if not .Values.auth.oidc.clientId -}}
{{-   fail "auth.oidc.clientId is required. Set it via --set auth.oidc.clientId=<value>" -}}
{{- end }}

{{/*
HELM-03: Validate OpenFGA store ID is set.
*/}}
{{- if not .Values.authz.openfga.storeId -}}
{{-   fail "authz.openfga.storeId is required. Set it via --set authz.openfga.storeId=<value>" -}}
{{- end }}

{{/*
HELM-04: Validate PAS database URL is set (either inline or via existing secret).
*/}}
{{- if and (not .Values.sync.pas.dbUrl) (not .Values.sync.pas.existingSecret) -}}
{{-   fail "sync.pas.dbUrl or sync.pas.existingSecret is required. Set via --set sync.pas.dbUrl=<value> or --set sync.pas.existingSecret=<secret-name>" -}}
{{- end }}

{{/*
Validate that the referenced external secrets exist at deploy time.
Note: `lookup` returns empty dict on first install (--dry-run), so we only
enforce on upgrades where the cluster state is available.
*/}}
{{- if .Release.IsUpgrade }}
{{-   $pgSecret := (lookup "v1" "Secret" .Release.Namespace .Values.storage.postgres.existingSecret) }}
{{-   if not $pgSecret }}
{{-     fail (printf "Required secret '%s' not found in namespace '%s'. Create it before installing the chart." .Values.storage.postgres.existingSecret .Release.Namespace) }}
{{-   end }}
{{-   if .Values.auth.oidc.existingSecret }}
{{-     $oidcSecret := (lookup "v1" "Secret" .Release.Namespace .Values.auth.oidc.existingSecret) }}
{{-     if not $oidcSecret }}
{{-       fail (printf "Required secret '%s' not found in namespace '%s'." .Values.auth.oidc.existingSecret .Release.Namespace) }}
{{-     end }}
{{-   end }}
{{-   if .Values.sync.pas.existingSecret }}
{{-     $pasSecret := (lookup "v1" "Secret" .Release.Namespace .Values.sync.pas.existingSecret) }}
{{-     if not $pasSecret }}
{{-       fail (printf "Required secret '%s' not found in namespace '%s'." .Values.sync.pas.existingSecret .Release.Namespace) }}
{{-     end }}
{{-   end }}
{{- end }}
