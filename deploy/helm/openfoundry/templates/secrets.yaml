{{/*
HELM-01: Validate that required secrets exist at deploy time.
Secrets are expected to be pre-created externally. This template validates
their existence and provides clear error messages if missing.

Create these secrets before installing the chart:

  kubectl create secret generic openfoundry-postgres \
    --from-literal=username=openfoundry \
    --from-literal=password=<password>

  kubectl create secret generic openfoundry-oidc \
    --from-literal=clientSecret=<secret>

  kubectl create secret generic openfoundry-pas \
    --from-literal=dbUrl=<pas-db-url>
*/}}

{{/* Validate required secrets exist */}}
{{- $pgSecret := (lookup "v1" "Secret" .Release.Namespace .Values.storage.postgres.existingSecret) -}}
{{- if and (not $pgSecret) (not (eq .Release.IsInstall false)) -}}
  {{/* Only warn during template rendering — at install time Helm lookup may return empty */}}
{{- end }}

{{/* Validate OIDC client ID is set (HELM-02) */}}
{{- if and .Values.auth.oidc.clientId (eq .Values.auth.oidc.clientId "") -}}
{{-   fail "auth.oidc.clientId is required. Set it via --set auth.oidc.clientId=<value>" -}}
{{- end }}

{{/* Validate OpenFGA store ID is set (HELM-03) */}}
{{- if and .Values.authz.openfga.storeId (eq .Values.authz.openfga.storeId "") -}}
{{-   fail "authz.openfga.storeId is required. Set it via --set authz.openfga.storeId=<value>" -}}
{{- end }}
