apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfoundry.fullname" . }}-api-gateway
  labels:
    {{- include "openfoundry.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "openfoundry.selectorLabels" (dict "name" "api-gateway" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openfoundry.selectorLabels" (dict "name" "api-gateway" "release" .Release.Name) | nindent 8 }}
        app.kubernetes.io/component: api-gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openfoundry.serviceAccountName" . }}
      {{- if eq (.Values.apiGateway.antiAffinity | default "") "soft" }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: api-gateway
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{/* HELM-07: Security context for all pods */}}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api-gateway
          image: {{ include "openfoundry.image" (dict "global" .Values.image "svc" .Values.apiGateway.image "name" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{/* HELM-07: Container security context */}}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.apiGateway.port | quote }}
            - name: OTEL_SERVICE_NAME
              value: api-gateway
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.postgres.existingSecret }}
                  key: {{ .Values.storage.postgres.secretKeys.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.postgres.existingSecret }}
                  key: {{ .Values.storage.postgres.secretKeys.password }}
            - name: POSTGRES_URL
              value: {{ include "openfoundry.postgresUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "openfoundry.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- range .Values.domainPacksExtra.sources }}
            - name: pack-{{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- range .Values.domainPacksExtra.sources }}
        - name: pack-{{ .name }}
          {{- if .configMap }}
          configMap:
            name: {{ .configMap }}
          {{- else if .persistentVolumeClaim }}
          persistentVolumeClaim:
            claimName: {{ .persistentVolumeClaim.claimName }}
            readOnly: true
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
