{{/*
HELM-14: Create a dedicated ServiceAccount for all Open Foundry deployments.
Avoids using the cluster default service account which may have excessive permissions.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openfoundry.serviceAccountName" . }}
  labels:
    {{- include "openfoundry.labels" . | nindent 4 }}
automountServiceAccountToken: false
