apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openfoundry.fullname" . }}-config
  labels:
    {{- include "openfoundry.labels" . | nindent 4 }}
data:
  STORAGE_PROVIDER: {{ .Values.storage.provider | quote }}
  POSTGRES_HOST: {{ .Values.storage.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.storage.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.storage.postgres.database | quote }}
  REDPANDA_BROKERS: {{ .Values.eventBus.redpanda.bootstrapServers | quote }}
  OIDC_ISSUER: {{ .Values.auth.oidc.issuer | quote }}
  {{/* HELM-05: OIDC_CLIENT_ID moved to deployment env from secret if sensitive,
       kept in ConfigMap as it is typically a public client identifier */}}
  OIDC_CLIENT_ID: {{ .Values.auth.oidc.clientId | quote }}
  OPENFGA_URL: {{ .Values.authz.openfga.url | quote }}
  {{/* HELM-06: OPENFGA_STORE_ID is infrastructure config, not a secret */}}
  OPENFGA_STORE_ID: {{ .Values.authz.openfga.storeId | quote }}
  CEL_EVALUATOR_URL: {{ .Values.celEvaluator.url | quote }}
  DEBEZIUM_URL: {{ .Values.sync.debezium.url | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otlp.endpoint | quote }}
  DOMAIN_PACKS: {{ .Values.domainPacks | toJson | quote }}
  NODE_ENV: {{ .Values.nodeEnv | default "production" | quote }}
  {{- if .Values.cors.allowedOrigins }}
  CORS_ALLOWED_ORIGINS: {{ .Values.cors.allowedOrigins | join "," | quote }}
  {{- end }}
  {{- if .Values.fhirBaseUrl }}
  FHIR_BASE_URL: {{ .Values.fhirBaseUrl | quote }}
  {{- end }}
