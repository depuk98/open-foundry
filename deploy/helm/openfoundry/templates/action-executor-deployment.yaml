apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfoundry.fullname" . }}-action-executor
  labels:
    {{- include "openfoundry.labels" . | nindent 4 }}
    app.kubernetes.io/component: action-executor
spec:
  replicas: {{ .Values.actionExecutor.replicaCount }}
  selector:
    matchLabels:
      {{- include "openfoundry.selectorLabels" (dict "name" "action-executor" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openfoundry.selectorLabels" (dict "name" "action-executor" "release" .Release.Name) | nindent 8 }}
        app.kubernetes.io/component: action-executor
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openfoundry.serviceAccountName" . | default "default" }}
      {{/* HELM-07: Security context for all pods */}}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: action-executor
          image: {{ include "openfoundry.image" (dict "global" .Values.image "svc" .Values.actionExecutor.image "name" "actions") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{/* HELM-07: Container security context */}}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.actionExecutor.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.actionExecutor.port | quote }}
            - name: OTEL_SERVICE_NAME
              value: action-executor
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.postgres.existingSecret }}
                  key: {{ .Values.storage.postgres.secretKeys.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.postgres.existingSecret }}
                  key: {{ .Values.storage.postgres.secretKeys.password }}
            - name: POSTGRES_URL
              value: {{ include "openfoundry.postgresUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "openfoundry.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.actionExecutor.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
