name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Generate spec artifacts
        run: pnpm --filter @openfoundry/api spec:all

      - name: Create release if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark SemVer pre-release tags (containing a hyphen, e.g. v0.1.0-rc.2)
          # as GitHub pre-releases so they don't claim the "Latest" badge.
          PRERELEASE=""
          case "${{ github.ref_name }}" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              $PRERELEASE

      - name: Upload spec artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            packages/api/spec/openapi.yaml \
            packages/api/spec/schema.graphql \
            packages/api/spec/asyncapi.yaml \
            --clobber
