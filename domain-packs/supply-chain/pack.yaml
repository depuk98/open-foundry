# pack.yaml
name: supply-chain
version: 0.1.0
description: "Supply chain control tower domain pack — visibility, disruption management, and inventory optimization"
namespace: supply.chain

dependencies:
  openfoundry.core: ">=1.0.0"

provides:
  objectTypes: 6
  linkTypes: 7
  actionTypes: 4
  functions: 0
  connectors: 1
  widgets: 0
  qualityRules: 0

schema:
  - schema/enums.odl
  - schema/links.odl
  - schema/actions.odl
  - objects/product.odl
  - objects/supplier.odl
  - objects/facility.odl
  - objects/purchase-order.odl
  - objects/shipment.odl
  - observations/inventory-record.odl

actions:
  - actions/create-order.yaml
  - actions/ship-order.yaml
  - actions/receive-shipment.yaml
  - actions/cancel-order.yaml

connectors:
  - connectors/erp-jdbc.yaml

permissions:
  - permissions/supply-chain-roles.fga
