# OSINT Domain Pack Seed Data
#
# Bootstrap data applied idempotently at boot.
# Provides initial source profiles with credibility scores
# for the monitored OSINT feeds.

seed:
  - type: SourceProfile
    ref: src_tw_sentdefender
    properties:
      handle: "@sentdefender"
      displayName: "Sentdefender"
      platform: "twitter"
      categories: ["CONFLICT_MONITOR", "OSINT_ANALYST"]
      primaryCountry: US
      credibilityScore: 0.85
      credibilityBasis: "track_record"
      isMonitored: true
      monitoringPriority: 1
      status: ACTIVE

