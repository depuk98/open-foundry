# pack.yaml
name: nhs-acute
version: 0.2.0
description: "NHS acute healthcare domain pack — pilot slice"
namespace: nhs.acute

dependencies:
  openfoundry.core: ">=1.0.0"

provides:
  objectTypes: 5
  linkTypes: 6
  actionTypes: 4
  functions: 0
  connectors: 1
  widgets: 0
  qualityRules: 0

schema:
  - schema/enums.odl
  - schema/patient.odl
  - schema/ward.odl
  - schema/bed.odl
  - schema/consultant.odl
  - schema/discharge-record.odl
  - schema/links.odl
  - schema/actions.odl

actions:
  - actions/admit-patient.yaml
  - actions/discharge-patient.yaml
  - actions/transfer-ward.yaml
  - actions/clean-bed.yaml

connectors:
  - connectors/pas-jdbc.yaml

permissions:
  - permissions/nhs-roles.fga
